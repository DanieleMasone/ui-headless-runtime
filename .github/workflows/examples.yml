name: Consumer examples

on:
  workflow_dispatch:
  pull_request:
    paths:
      - examples/**
      - scripts/verify-consumer-examples.mjs
      - .github/workflows/examples.yml

concurrency:
  group: consumer-examples-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify standalone npm consumers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/consumers/*/package-lock.json

      - name: Install, typecheck, and build consumers
        run: npm run examples:verify
