name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify production artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Check unused files, exports, and dependencies
        run: npm run unused:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests and coverage
        run: npm run test:coverage

      - name: Build package, demo, API reference, and static documentation
        run: npm run build

      - name: Verify generated documentation
        run: npm run docs:check

      - name: Verify real package tarball
        run: npm run package:check

      - name: Compose and verify Pages site
        run: npm run build:site && npm run site:check

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Real-browser integration
        run: npm run test:browser

      - name: Cross-browser E2E and accessibility acceptance
        run: npm run test:acceptance

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload tested Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site-dist
          include-hidden-files: true

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy exact verified artifact
        id: deployment
        uses: actions/deploy-pages@v5
