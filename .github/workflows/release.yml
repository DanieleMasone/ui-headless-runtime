name: Release npm package

on:
  release:
    types: [published]

concurrency:
  group: npm-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js and npm registry
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use the repository npm CLI version
        shell: bash
        run: |
          set -euo pipefail
          expected="$(node -p "require('./package.json').packageManager.split('@').at(-1)")"
          if [[ "$(npm --version)" != "$expected" ]]; then npm install --global "npm@$expected"; fi
          test "$(npm --version)" = "$expected"

      - name: Verify tag, version, and release commit
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ github.event.release.tag_name }}'
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]
          version="$(node -p "require('./packages/ui-headless-runtime/package.json').version")"
          test "$tag" = "v$version"
          test "$(git rev-list -n 1 "$tag")" = "$(git rev-parse HEAD)"
          git merge-base --is-ancestor "$(git rev-parse HEAD)" origin/main

      - name: Install dependencies
        run: npm ci

      - name: Install browser for real-browser verification
        run: npx playwright install --with-deps chromium

      - name: Run release quality gates
        run: npm run release:quality

      - name: Pack release tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir release-tarball
          npm pack --workspace ui-headless-runtime --pack-destination release-tarball --json > release-tarball/metadata.json
          tarball="$(node -p "require('./release-tarball/metadata.json')[0].filename")"
          test -f "release-tarball/$tarball"

      - name: Verify exact release tarball
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(node -p "require('./release-tarball/metadata.json')[0].filename")"
          node scripts/package-check.mjs "release-tarball/$tarball"

      - name: Ensure version is not already published
        run: node scripts/check-package-version.mjs

      - name: Publish with npm Trusted Publishing
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./packages/ui-headless-runtime/package.json').version")"
          tarball="$(node -p "require('./release-tarball/metadata.json')[0].filename")"
          if [[ "$version" == *-* ]]; then dist_tag=next; else dist_tag=latest; fi
          test -f "./release-tarball/$tarball"
          npm publish "./release-tarball/$tarball" --access public --tag "$dist_tag"
