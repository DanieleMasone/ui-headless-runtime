version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-non-breaking:
        patterns: ['*']
        update-types: [minor, patch]
    ignore:
      - dependency-name: '@types/node'
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-non-breaking:
        patterns: ['*']
        update-types: [minor, patch]
